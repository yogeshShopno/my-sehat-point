  <script src="/assets/js/custom.js" defer></script>

  <script>
    (function () {
      const toggle = document.getElementById('billingToggle');
      const amounts = document.querySelectorAll('.pricing-card .amount');
      function setPrices(yearly) {
        amounts.forEach(el => {
          const m = el.getAttribute('data-monthly');
          const y = el.getAttribute('data-yearly');
          el.textContent = yearly ? y : m;
        });
      }
      setPrices(false);
      toggle && toggle.addEventListener('change', e => setPrices(e.target.checked));
    })();
  </script>
</body>
